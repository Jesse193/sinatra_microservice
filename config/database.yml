default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5

development:
  <<: *default
  database: microservice_sinatra_development

production:
  adapter: postgresql
  encoding: utf8
  database: <%= ENV['RDS_DB_NAME'] %>
  username: <%= ENV['RDS_USERNAME'] %>
  password: <%= ENV['RDS_PASSWORD'] %>
  host: <%= ENV['RDS_HOSTNAME'] %>
  port: <%= ENV['RDS_PORT'] %>
  pool: 5

supabase:
  adapter: postgresql
  encoding: unicode
  database: <%= ENV['SUPABASE_DB_NAME'] || 'postgres' %>
  username: <%= ENV['SUPABASE_DB_USERNAME'] %>
  password: <%= ENV['SUPABASE_DB_PASSWORD'] %>
  host: <%= ENV['SUPABASE_DB_HOSTNAME'] %>
  port: <%= ENV['SUPABASE_DB_PORT'] || 6543 %>
  pool: 5
  prepared_statements: false
  advisory_locks: false

test: 
  <<: *default
  database: microservice_sinatra_test

#when deploying, remember this was important: `rake db:environment:set`
